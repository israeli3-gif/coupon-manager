<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Coupons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        .coupon-card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .barcode-svg { width: 100%; height: auto; }
        .fab { width: 60px; height: 60px; font-size: 24px; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-4">
        <h1 class="text-center mb-4">My Active Coupons</h1>

        <div class="text-center mb-4">
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#recommendModal">Smart Checkout (Recommend Coupons)</button>
        </div>

        
        
        <div class="row" id="coupon-list">
            {% for coupon in coupons %}
            <div class="col-md-6">
                <div class="card coupon-card">
                    <div class="card-body text-center">
                        <h5 class="card-title">{{ coupon.company }}</h5>
                        <p class="card-text text-success fw-bold">{{ coupon.amount }} NIS</p>
                        <svg id="barcode-{{ coupon.id }}" class="barcode-svg"></svg>
                        <p class="text-muted small mt-2">Expires: {{ coupon.expiration_date.strftime('%Y-%m-%d') }}</p>
                        <button class="btn btn-outline-danger btn-sm mt-2" onclick="useCoupon({{ coupon.id }})">Mark as Used</button>
                    </div>
                </div>
                <script>
                    JsBarcode("#barcode-{{ coupon.id }}", "{{ coupon.barcode }}", {
                        format: "CODE128",
                        displayValue: true
                    });
                </script>
            </div>
            {% endfor %}
        </div>

        <div class="fixed-bottom p-4 text-end">
            <button class="btn btn-primary rounded-circle shadow-lg fab" data-bs-toggle="modal" data-bs-target="#uploadModal">+</button>
        </div>
    </div>

    
    <div class="modal fade" id="recommendModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Smart Checkout Calculator</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="recommendForm">
                        <div class="mb-3">
                            <label class="form-label">Company</label>
                            <select class="form-select" id="recCompany" required>
                                <option value="Shufersal">Shufersal</option>
                                <option value="Victory">Victory</option>
                                <option value="Wolt">Wolt</option>
                                <option value="BuyMe">BuyMe</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Bill Amount (NIS)</label>
                            <input type="number" class="form-control" id="recAmount" required step="0.1" min="0.1">
                        </div>
                        <button type="submit" class="btn btn-success w-100">Find Best Coupons</button>
                    </form>
                    
                    <div id="recommendResults" class="mt-4" style="display: none;">
                        <h6 class="fw-bold border-bottom pb-2">Recommended Coupons:</h6>
                        <ul id="recommendedList" class="list-group mb-2"></ul>
                        <div class="alert alert-info" id="recommendSummary"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="uploadModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Upload New Coupon</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="uploadForm">
                        <div class="mb-3">
                            <label class="form-label">Amount (NIS)</label>
                            <input type="number" class="form-control" name="amount" required step="0.1">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Company</label>
                            <select class="form-select" name="company" required>
                                <option value="Shufersal">Shufersal</option>
                                <option value="Victory">Victory</option>
                                <option value="Wolt">Wolt</option>
                                <option value="BuyMe">BuyMe</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Coupon Screenshot (Cropped)</label>
                            <input type="file" class="form-control" name="file" accept="image/*" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Upload and Save</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Use Coupon Function
        async function useCoupon(id) {
            if (confirm("Are you sure you want to mark this coupon as used?")) {
                const response = await fetch(`/use-coupon/${id}`, { method: 'POST' });
                if (response.ok) location.reload();
            }
        }

        // Upload Form Logic
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            // Show loading state (optional)
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.innerText = "Processing...";
            submitBtn.disabled = true;

            const response = await fetch('/upload-coupon/', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();
            if (result.status === 'success') {
                location.reload();
            } else {
                alert("Error: " + result.message);
                submitBtn.innerText = "Upload and Save";
                submitBtn.disabled = false;
            }
        };


        // Recommend Coupons Logic
        document.getElementById('recommendForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const company = document.getElementById('recCompany').value;
            const amount = document.getElementById('recAmount').value;
            const resultsDiv = document.getElementById('recommendResults');
            const listDiv = document.getElementById('recommendedList');
            const summaryDiv = document.getElementById('recommendSummary');
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.innerText = "Calculating...";
            submitBtn.disabled = true;

            try {
                // Call our new API endpoint
                const response = await fetch(`/recommend-coupons/?company=${company}&bill_amount=${amount}`);
                const result = await response.json();
                
                listDiv.innerHTML = ""; // Clear previous results
                resultsDiv.style.display = "block"; // Show the results area
                
                if (result.status === 'success' && result.coupons.length > 0) {
                    // Display each recommended coupon
                    result.coupons.forEach(c => {
                        const li = document.createElement('li');
                        li.className = "list-group-item d-flex justify-content-between align-items-center";
                        li.innerHTML = `Barcode: ${c.barcode} <span class="badge bg-success rounded-pill">${c.amount} NIS</span>`;
                        listDiv.appendChild(li);
                    });
                    summaryDiv.className = "alert alert-success mt-2";
                    summaryDiv.innerText = `Total Coupon Value: ${result.total_value} NIS`;
                } else {
                    // No coupons found case
                    summaryDiv.className = "alert alert-warning mt-2";
                    summaryDiv.innerText = "No relevant coupons found for this amount.";
                }
            } catch (error) {
                alert("Error fetching recommendations.");
            }
            
            submitBtn.innerText = "Find Best Coupons";
            submitBtn.disabled = false;
        };

    </script>
</body>
</html>
