<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Coupons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        .coupon-card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .barcode-svg { width: 100%; height: auto; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-4">
        <h1 class="text-center mb-4">My Active Coupons</h1>
        
        <div class="row" id="coupon-list">
            {% for coupon in coupons %}
            <div class="col-md-6">
                <div class="card coupon-card">
                    <div class="card-body text-center">
                        <h5 class="card-title">{{ coupon.company }}</h5>
                        <p class="card-text text-success fw-bold">{{ coupon.amount }} NIS</p>
                        
                        <svg id="barcode-{{ coupon.id }}" class="barcode-svg"></svg>
                        
                        <p class="text-muted small mt-2">Expires: {{ coupon.expiration_date.strftime('%Y-%m-%d') }}</p>
                        <button class="btn btn-outline-danger btn-sm mt-2" onclick="useCoupon({{ coupon.id }})">Mark as Used</button>
                    </div> </div> <script>
                    // Generate the barcode for this specific coupon
                    JsBarcode("#barcode-{{ coupon.id }}", "{{ coupon.barcode }}", {
                        format: "CODE128",
                        displayValue: true
                    });

                    // Function to call the backend and mark coupon as used
                    async function useCoupon(id) {
                        if (confirm("Are you sure you want to mark this coupon as used?")) {
                            const response = await fetch(`/use-coupon/${id}`, { method: 'POST' });
                            const result = await response.json();
                            if (result.status === 'success') {
                                location.reload(); // Refresh the page to remove the coupon
                            } else {
                                alert("Error: " + result.message);
                            }
                        }
                    }
                </script>
            </div>
            {% endfor %}
        </div>
        
        <div class="fixed-bottom p-4 text-end">
            <button class="btn btn-primary rounded-circle shadow-lg" style="width: 60px; height: 60px; font-size: 24px;">+</button>
        </div>
    </div>
</body>
</html>
